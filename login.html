<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#f1dfd1,#e2d1c3);
}

/* CARD */

.container{
background:#f5f5f5;
width:400px;
padding:45px;
border-radius:30px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
text-align:center;
}

/* LOGO */

.logo{
font-size:32px;
font-weight:800;
color:#ff0f7b;
letter-spacing:3px;
margin-bottom:10px;
}

/* TITLE */

h2{
margin-bottom:30px;
color:#222;
}

/* INPUT BOX */

.input-box{
position:relative;
margin:15px 0;
}

.input-box input{
width:85%;
padding:14px 45px 14px 15px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

/* ICON RIGHT */

.input-box i{
position:absolute;
right:15px;
top:15px;
color:#888;
}

/* SIGN IN BUTTON */

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#ff0f7b,#f89b29);
color:white;
}

/* FORGOT PASSWORD */

.forgot{
margin-top:15px;
font-size:14px;
}

.forgot a{
color:#ff0f7b;
text-decoration:none;
}

/* DIVIDER */

.divider{
margin:25px 0;
display:flex;
align-items:center;
text-align:center;
color:#999;
}

.divider::before,
.divider::after{
content:'';
flex:1;
border-bottom:1px solid #ddd;
}

.divider:not(:empty)::before{
margin-right:10px;
}

.divider:not(:empty)::after{
margin-left:10px;
}

/* GOOGLE BUTTON */

.google-btn{
background:white;
color:#333;
border:1px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:10px;
}

.google-btn img{
width:20px;
}

/* SIGNUP TEXT */

.signup{
margin-top:25px;
font-size:15px;
}

.signup a{
color:#ff0f7b;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h2>Sign in to your account</h2>

<form onsubmit="loginUser(event) ">

<div class="input-box">
<input type="email" id="email" placeholder="Email" required>
<i class="fa fa-envelope"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password" required>
<i class="fa fa-eye" onclick="togglePassword()" style="cursor:pointer"></i>
</div>

<button type="submit">Sign In</button>

</form>

<div class="forgot">
<a href="#">Forgot your password?</a>
</div>

<div class="divider">OR</div>

<button class="google-btn">
<img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
Continue with Google
</button>

<div class="signup">
Don't have an account? <a href="register1.html">Sign up</a>
</div>

</div>

<script>

function togglePassword(){
let pass=document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}

async function loginUser(event){

event.preventDefault();

try{

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let res=await fetch("http://localhost:3000/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

let data=await res.json();

if(data.success){

localStorage.setItem("currentUser", JSON.stringify({
name:data.name,
email:data.email
}));

alert("Login Successful");
window.location.href="event.html";

}
else{
alert(data.message);
}

}catch(error){
alert("Server connection error");
console.log(error);
}

}

</script>

</body>
</html>
