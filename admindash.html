<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background:#f1f3f6;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#2c3e50;
color:white;
padding:15px 40px;
}

.header h1{
margin:0;
font-size:26px;
}

/* LOGOUT BUTTON */

.logout-btn{
background:#e74c3c;
border:none;
padding:10px 18px;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.logout-btn:hover{
background:#c0392b;
}

/* MAIN CONTAINER */

.container{
width:90%;
max-width:1200px;
margin:auto;
margin-top:30px;
}

/* CARDS */

.box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:30px;
}

/* TITLES */

.box h3{
margin-bottom:20px;
color:#34495e;
}

/* INPUTS */

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

/* BUTTON */

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

/* GRID */

.grid{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:20px;
}

/* CARD */

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
width:250px;
}

.card p{
margin:6px 0;
}

/* DELETE BUTTON */

.delete-btn{
background:#e74c3c;
margin-top:10px;
}

.delete-btn:hover{
background:#c0392b;
}
.card input{
margin:6px 0;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* RESPONSIVE */

@media(max-width:768px){

.grid{
flex-direction:column;
align-items:center;
}

}

</style>

<script>

/* ADD EVENT */

async function addEvent(){

let name = document.getElementById("ename").value;
let date = document.getElementById("edate").value;
let time = document.getElementById("time").value;
let location = document.getElementById("location").value;
let price = document.getElementById("price").value;

let res = await fetch("http://localhost:3000/addevent",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name,date,time,location,price})
});

let data = await res.json();

alert(data.message);

viewEvents();

}

/* VIEW EVENTS */

async function viewEvents(){

let res = await fetch("http://localhost:3000/events");
let events = await res.json();

let output="";

events.forEach(e=>{

output += `
<div class="card">

<p><b>Name:</b> ${e.name}</p>

<input type="date" 
id="date${e._id}" 
value="${e.date}" 
placeholder="Date">

<input type="time" 
id="time${e._id}" 
value="${e.time}" 
placeholder="Time">

<input type="text" 
id="location${e._id}" 
value="${e.location}" 
placeholder="Location">

<input type="number" 
id="price${e._id}" 
value="${e.price}" 
placeholder="Price">

<br><br>

<button onclick="updateEvent('${e._id}')">
Update
</button>

<button class="delete-btn" onclick="deleteEvent('${e._id}')">
Delete
</button>

</div>
`;
});

document.getElementById("eventList").innerHTML=output;

}
// update the event
async function updateEvent(id){

let date = document.getElementById("date"+id).value;
let time = document.getElementById("time"+id).value;
let location = document.getElementById("location"+id).value;
let price = document.getElementById("price"+id).value;

let res = await fetch("http://localhost:3000/updateevent/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({date,time,location,price})
});

let data = await res.json();

alert(data.message);

viewEvents();

}
/* DELETE EVENT */

async function deleteEvent(id){

let confirmDelete = confirm("Delete this event?");

if(!confirmDelete) return;

let res = await fetch("http://localhost:3000/deleteevent/"+id,{
method:"DELETE"
});

let data = await res.json();

alert(data.message);

viewEvents();

}

/* LOAD BOOKINGS */

async function loadAllBookings(){

let res = await fetch("http://localhost:3000/bookings");

let bookings = await res.json();

let output="";

bookings.forEach(b=>{

output += `
<div class="card">

<p><b>User:</b> ${b.username}</p>
<p><b>Event:</b> ${b.eventName}</p>

</div>
`;

});

document.getElementById("allBookings").innerHTML=output;

}

/* LOAD USERS */

async function loadUsers(){

let response = await fetch("http://localhost:3000/users");

let users = await response.json();

let list="";

users.forEach(user=>{

list += `
<div class="card">

<p><b>Email:</b> ${user.email}</p>
<p><b>Password:</b> ${user.password}</p>

</div>
`;

});

document.getElementById("userList").innerHTML=list;

}

/* LOGOUT */

function logoutAdmin(){

let confirmLogout = confirm("Logout from admin panel?");

if(confirmLogout){

window.location.href="register.html";

}

}

</script>

</head>

<body onload="loadAllBookings(); loadUsers(); viewEvents()">

<!-- HEADER -->

<div class="header">

<h1>Admin Dashboard</h1>

<button class="logout-btn" onclick="logoutAdmin()">Logout</button>

</div>

<!-- MAIN CONTENT -->

<div class="container">

<!-- ADD EVENT -->

<div class="box">

<h3>Add Event</h3>

<input type="text" id="ename" placeholder="Event Name">

<input type="date" id="edate">

<input type="time" id="time">

<input type="text" id="location" placeholder="Enter Location">

<input type="number" id="price" placeholder="Enter Price">

<button onclick="addEvent()">Add Event</button>

</div>

<!-- EVENTS -->

<div class="box">

<h3>All Events</h3>

<div id="eventList" class="grid"></div>

</div>

<!-- USERS + BOOKINGS -->

<div class="box">

<h3>Registered Users</h3>

<div id="userList" class="grid"></div>

<br>

<h3>All Bookings</h3>

<div id="allBookings" class="grid"></div>

</div>

</div>

</body>
</html>
